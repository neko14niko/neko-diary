<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ねこちゃんの日記</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      color: #333;
      background-color: #fff0f5;
      background-image: radial-gradient(circle, #ffb6c1 4px, transparent 4px);
      background-size: 32px 32px;
      min-height: 100vh;



    }

    header {
      background: #ffb6c1;
      background-image: radial-gradient(circle, rgba(255,255,255,0.2) 1.5px, transparent 1.5px);
      background-size: 16px 16px;
      color: white;
      padding: 12px 20px;
      font-size: 18px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .layout {
    .layout {
      display: flex;
      max-width: 1600px;
      margin: 0 auto;
      padding: 20px 16px;
      gap: 20px;
      align-items: flex-start;
    }

    /* サイドバー */
    .sidebar {
      width: 220px;
      background: rgba(255,255,255,0.92);
      border-right: 1px solid #ffd6e0;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;

    }

    .calendar-wrap {
      padding: 16px 12px 8px;
      border-bottom: 1px solid #ffd6e0;
    }
    .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .cal-nav span { font-size: 14px; font-weight: bold; color: #ffb6c1; }
    .cal-nav button { background: none; border: none; color: #ffb6c1; font-size: 18px; cursor: pointer; padding: 0 4px; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; }
    .cal-dow { font-size: 10px; color: #aaa; padding: 2px 0; }
    .cal-day {
      font-size: 12px; padding: 4px 0; border-radius: 50%;
      cursor: pointer; transition: background 0.15s;
    }
    .cal-day:hover { background: #ffd6e0; }
    .cal-day.today { background: #ffb6c1; color: white; font-weight: bold; }
    .cal-day.has-entry { position: relative; }
    .cal-day.has-entry::after {
      content: ''; position: absolute; bottom: 1px; left: 50%; transform: translateX(-50%);
      width: 4px; height: 4px; background: #ffb6c1; border-radius: 50%;
    }
    .cal-day.today.has-entry::after { background: white; }
    .cal-day.selected { background: #ff9aaa; color: white; }
    .cal-day.sun { color: #ff9aaa; }
    .cal-day.sat { color: #99aaff; }
    .cal-day.empty { cursor: default; }

    .search-wrap { padding: 10px 12px; border-bottom: 1px solid #ffd6e0; }
    .search-wrap input {
      width: 100%; padding: 6px 10px;
      border: 1px solid #ffccd5; border-radius: 4px;
      font-size: 13px;
    }

    .entry-list { max-height: 300px; overflow-y: auto; padding: 8px 0; }
    .entry-item {
      padding: 8px 12px; cursor: pointer;
      border-bottom: 1px solid #fff0f5;
      transition: background 0.1s;
    }
    .entry-item:hover { background: #fff5f7; }
    .entry-item.active { background: #ffe0e8; }
    .entry-item-date { font-size: 11px; color: #ffb6c1; font-weight: bold; }
    .entry-item-title { font-size: 13px; color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .entry-item-cat {
      display: inline-block; font-size: 10px; padding: 1px 6px;
      border-radius: 10px; margin-top: 2px;
      background: #ffd6e0; color: #c05070;
    }

    /* メインエリア */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;


      gap: 12px;
    }

    .editor-header {
      display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    }
    .editor-date { font-size: 16px; font-weight: bold; color: #ffb6c1; }
    .cat-select {
      padding: 6px 10px; border: 1px solid #ffccd5; border-radius: 4px;
      font-size: 13px; background: white; color: #555; cursor: pointer;
    }
    .btn {
      background: #ffb6c1; color: white; border: none;
      padding: 7px 18px; border-radius: 4px; cursor: pointer; font-size: 13px;
    }
    .btn:hover { background: #ff9aaa; }
    .btn.gray { background: #f0f0f0; color: #555; }
    .btn.gray:hover { background: #e0e0e0; }
    .btn.red { background: #ffe0e6; color: #c0404a; }
    .btn.red:hover { background: #ffc8d0; }

    .editor-body { display: flex; gap: 12px; }

    textarea#diary-text {
      flex: 1; padding: 14px; border: 1px solid #ffccd5; border-radius: 8px;
      font-size: 15px; line-height: 1.8; resize: none;
      background: rgba(255,255,255,0.95);
    }
    textarea#diary-text:focus { outline: none; border-color: #ffb6c1; }

    /* メモパネル */
    .memo-panel {
      width: 320px; display: flex; flex-direction: column; gap: 6px;
    }
    .memo-panel label { font-size: 12px; color: #ffb6c1; font-weight: bold; }
    textarea#memo-text {
      flex: 1; padding: 10px; border: 1px solid #ffccd5; border-radius: 8px;
      font-size: 13px; line-height: 1.6; resize: none;
      background: rgba(255,255,255,0.95);
    }
    .memo-saved { font-size: 11px; color: #bbb; text-align: right; }

    /* AI分析パネル */
    .ai-panel {
      background: rgba(255,255,255,0.95);
      border: 1px solid #ffccd5;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      display: none;
    }
    .ai-panel.show { display: block; }
    .ai-emotion { font-size: 20px; font-weight: bold; color: #ffb6c1; margin-bottom: 4px; }
    .ai-advice { color: #555; line-height: 1.6; }
    .ai-bar-wrap { margin: 8px 0; }
    .ai-bar {
      height: 8px; background: #ffd6e0; border-radius: 4px; overflow: hidden;
    }
    .ai-bar-fill { height: 100%; background: #ffb6c1; border-radius: 4px; transition: width 0.5s; }

    /* チャットパネル */
    .chat-panel {
      background: rgba(255,255,255,0.95);
      border: 1px solid #ffccd5;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      height: 320px;
      flex-shrink: 0;
    }
    .chat-header {
      padding: 8px 14px;
      font-size: 12px;
      font-weight: bold;
      color: #ffb6c1;
      border-bottom: 1px solid #ffd6e0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .chat-msg { max-width: 80%; padding: 8px 12px; border-radius: 12px; font-size: 13px; line-height: 1.5; }
    .chat-msg.user { align-self: flex-end; background: #ffb6c1; color: white; border-bottom-right-radius: 4px; }
    .chat-msg.ai { align-self: flex-start; background: #f5f5f5; color: #333; border-bottom-left-radius: 4px; }
    .chat-input-row { display: flex; gap: 8px; padding: 10px 14px; border-top: 1px solid #ffd6e0; }
    .chat-input-row input { flex: 1; padding: 7px 12px; border: 1px solid #ffccd5; border-radius: 20px; font-size: 13px; }
    .chat-input-row input:focus { outline: none; border-color: #ffb6c1; }
    .summary-preview {
      margin: 0 14px 10px;
      padding: 10px 12px;
      background: #fff5f7;
      border: 1px solid #ffb6c1;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.6;
      display: none;
    }
    .summary-actions { display: flex; gap: 8px; margin: 0 14px 10px; display: none; }
  </style>
</head>
<body>
  <header>
    <span>🐱 ねこちゃんの日記</span>
    <div style="display:flex;gap:8px;">
      <button onclick="document.getElementById('section-diary').scrollIntoView({behavior:'smooth'})" style="background:rgba(255,255,255,0.25);color:white;border:none;padding:6px 14px;border-radius:20px;cursor:pointer;font-size:13px;">日記</button>
      <button onclick="document.getElementById('section-schedule').scrollIntoView({behavior:'smooth'})" style="background:rgba(255,255,255,0.25);color:white;border:none;padding:6px 14px;border-radius:20px;cursor:pointer;font-size:13px;">明日の予定</button>
      <button onclick="document.getElementById('section-chat').scrollIntoView({behavior:'smooth'})" style="background:rgba(255,255,255,0.25);color:white;border:none;padding:6px 14px;border-radius:20px;cursor:pointer;font-size:13px;">AIチャット</button>
    </div>
  </header>

  <div class="layout">
    <!-- サイドバー -->
    <div class="sidebar">
      <div class="search-wrap">
        <input type="text" id="search-input" placeholder="🔍 検索..." oninput="searchEntries()">
      </div>
      <div class="entry-list" id="entry-list"></div>
    </div>

    <!-- メインエリア -->
    <div class="main">
      <div id="section-diary" class="editor-header">
        <span class="editor-date" id="editor-date"></span>
        <select class="cat-select" id="cat-select">
          <option value="日常">日常</option>
          <option value="仕事">仕事</option>
          <option value="プライベート">プライベート</option>
          <option value="健康">健康</option>
          <option value="その他">その他</option>
        </select>
        <button class="btn" onclick="saveEntry()">保存</button>
        <button class="btn gray" onclick="analyzeEntry()">✨ AI分析</button>
        <button class="btn red" onclick="deleteEntry()">削除</button>
      </div>

      <div class="ai-panel" id="ai-panel">
        <div class="ai-emotion" id="ai-emotion"></div>
        <div class="ai-bar-wrap">
          <div class="ai-bar"><div class="ai-bar-fill" id="ai-bar-fill"></div></div>
        </div>
        <div class="ai-advice" id="ai-advice"></div>
      </div>

      <div class="editor-body">
        <textarea id="diary-text" placeholder="今日の日記を書いてね..."></textarea>
        <div class="memo-panel">
          <label>📝 メモ</label>
          <textarea id="memo-text" placeholder="メモ..."></textarea>
          <div class="memo-saved" id="memo-saved"></div>
        </div>
      </div>

      <!-- 明日の予定 + カレンダー -->
      <div id="section-schedule" style="display:flex;gap:16px;align-items:flex-start;">
        <div style="background:rgba(255,255,255,0.95);border:1px solid #ffccd5;border-radius:8px;padding:16px;flex:1;min-width:300px;">
          <div style="font-size:13px;font-weight:bold;color:#ffb6c1;margin-bottom:10px;">📅 明日の予定</div>
          <textarea id="schedule-text" placeholder="明日の予定を書いてね..." style="width:100%;padding:12px;border:1px solid #ffccd5;border-radius:6px;font-size:14px;line-height:1.7;resize:vertical;min-height:120px;background:white;"></textarea>
          <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:8px;">
            <button class="btn" onclick="saveSchedule()">保存</button>
          </div>
          <div id="schedule-status" style="font-size:12px;color:#ffb6c1;margin-top:4px;text-align:right;"></div>
        </div>
        <div style="background:rgba(255,255,255,0.95);border:1px solid #ffccd5;border-radius:8px;padding:16px;flex-shrink:0;width:260px;">
          <div class="cal-nav" style="margin-bottom:8px;">
            <button onclick="changeMonth(-1)" style="background:none;border:none;color:#ffb6c1;font-size:18px;cursor:pointer;padding:0 4px;">&#8249;</button>
            <span id="cal-title" style="font-size:14px;font-weight:bold;color:#ffb6c1;"></span>
            <button onclick="changeMonth(1)" style="background:none;border:none;color:#ffb6c1;font-size:18px;cursor:pointer;padding:0 4px;">&#8250;</button>
          </div>
          <div class="cal-grid" id="cal-grid"></div>
        </div>
      </div>

      <!-- チャットパネル -->
      <div id="section-chat" class="chat-panel">
        <div class="chat-header">
          <span>💬 AIと話して日記を書く</span>
          <div style="display:flex;gap:6px;">
            <button class="btn gray" style="font-size:11px;padding:3px 10px;" onclick="summarizeChat()">要約して確認</button>
            <button class="btn gray" style="font-size:11px;padding:3px 10px;" onclick="clearChat()">クリア</button>
          </div>
        </div>
        <div class="chat-messages" id="chat-messages">
          <div class="chat-msg ai">こんにちは！今日はどんな一日でしたか？</div>
        </div>
        <div class="summary-preview" id="summary-preview"></div>
        <div class="summary-actions" id="summary-actions">
          <button class="btn" style="font-size:12px;padding:5px 14px;" onclick="appendSummary()">日記に追記する</button>
          <button class="btn gray" style="font-size:12px;padding:5px 14px;" onclick="dismissSummary()">閉じる</button>
        </div>
        <div class="chat-input-row">
          <input type="text" id="chat-input" placeholder="メッセージを入力..." onkeydown="if(event.key==='Enter')sendChat()">
          <button class="btn" style="padding:7px 16px;font-size:13px;" onclick="sendChat()">送信</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js';
    import { getFirestore, initializeFirestore, persistentLocalCache, persistentMultipleTabManager, doc, setDoc, getDoc, deleteDoc, collection, getDocs, query, orderBy } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js';

    // Firebase設定（.envから読み込めないためここに記載 → 後で設定）
    const firebaseConfig = {
      apiKey: "REMOVED",
      authDomain: "neko-dairy.firebaseapp.com",
      projectId: "neko-dairy",
      storageBucket: "neko-dairy.firebasestorage.app",
    };
    const firebaseApp = initializeApp(firebaseConfig);
    const db = getFirestore(firebaseApp);

    // ---- 状態 ----
    let calYear, calMonth;
    const today = new Date();
    calYear = today.getFullYear();
    calMonth = today.getMonth();
    let selectedDate = formatDate(today);
    let allEntries = {};

    function formatDate(d) {
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    // ---- カレンダー ----
    function renderCalendar() {
      const dows = ['日','月','火','水','木','金','土'];
      const firstDay = new Date(calYear, calMonth, 1).getDay();
      const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
      document.getElementById('cal-title').textContent = `${calYear}年${calMonth+1}月`;
      const grid = document.getElementById('cal-grid');
      grid.innerHTML = dows.map((d,i) => `<div class="cal-dow${i===0?' sun':i===6?' sat':''}">${d}</div>`).join('');
      for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div class="cal-day empty"></div>`;
      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const isToday = dateStr === formatDate(today);
        const isSelected = dateStr === selectedDate;
        const hasEntry = !!allEntries[dateStr];
        const dow = (firstDay + d - 1) % 7;
        const cls = ['cal-day',
          isSelected ? 'selected' : isToday ? 'today' : '',
          hasEntry ? 'has-entry' : '',
          dow===0 ? 'sun' : dow===6 ? 'sat' : '',
        ].filter(Boolean).join(' ');
        grid.innerHTML += `<div class="${cls}" data-date="${dateStr}" onclick="selectDate('${dateStr}')">${d}</div>`;
      }
    }

    window.changeMonth = (dir) => {
      calMonth += dir;
      if (calMonth > 11) { calMonth = 0; calYear++; }
      if (calMonth < 0)  { calMonth = 11; calYear--; }
      renderCalendar();
    };

    window.selectDate = (dateStr) => {
      selectedDate = dateStr;
      loadEntry(dateStr);
      renderCalendar();
      renderEntryList();
    };

    // ---- Firestore ----
    async function loadAllEntries() {
      const q = query(collection(db, 'entries'), orderBy('date', 'desc'));
      const snap = await getDocs(q);
      allEntries = {};
      snap.forEach(d => { allEntries[d.id] = d.data(); });
      renderCalendar();
      renderEntryList();
    }

    async function loadEntry(dateStr) {
      document.getElementById('editor-date').textContent = dateStr;
      document.getElementById('ai-panel').classList.remove('show');
      const data = allEntries[dateStr];
      document.getElementById('diary-text').value = data?.text || '';
      document.getElementById('cat-select').value = data?.category || '日常';
    }

    window.saveEntry = async () => {
      const text = document.getElementById('diary-text').value.trim();
      if (!text) return;
      const category = document.getElementById('cat-select').value;
      await setDoc(doc(db, 'entries', selectedDate), { date: selectedDate, text, category, updatedAt: new Date().toISOString() });
      allEntries[selectedDate] = { date: selectedDate, text, category };
      renderCalendar();
      renderEntryList();
    };

    window.deleteEntry = async () => {
      if (!allEntries[selectedDate]) return;
      if (!confirm('この日記を削除しますか？')) return;
      await deleteDoc(doc(db, 'entries', selectedDate));
      delete allEntries[selectedDate];
      document.getElementById('diary-text').value = '';
      document.getElementById('ai-panel').classList.remove('show');
      renderCalendar();
      renderEntryList();
    };

    // ---- エントリ一覧 ----
    function renderEntryList(filter = '') {
      const list = document.getElementById('entry-list');
      const entries = Object.values(allEntries)
        .filter(e => !filter || e.text.includes(filter) || e.date.includes(filter))
        .sort((a,b) => b.date.localeCompare(a.date));
      if (!entries.length) { list.innerHTML = '<div style="padding:12px;color:#bbb;font-size:13px;">日記なし</div>'; return; }
      list.innerHTML = entries.map(e => `
        <div class="entry-item${e.date === selectedDate ? ' active' : ''}" onclick="selectDate('${e.date}')">
          <div class="entry-item-date">${e.date}</div>
          <div class="entry-item-title">${e.text.slice(0,30)}${e.text.length>30?'…':''}</div>
          <span class="entry-item-cat">${e.category}</span>
        </div>
      `).join('');
    }

    window.searchEntries = () => {
      renderEntryList(document.getElementById('search-input').value.trim());
    };

    // ---- AI分析 ----
    window.analyzeEntry = async () => {
      const text = document.getElementById('diary-text').value.trim();
      if (!text) return;
      const panel = document.getElementById('ai-panel');
      document.getElementById('ai-emotion').textContent = '分析中...';
      document.getElementById('ai-advice').textContent = '';
      document.getElementById('ai-bar-fill').style.width = '0%';
      panel.classList.add('show');
      try {
        const res = await fetch("/api/analyze", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ text }) });
        const result = await res.json();
        document.getElementById('ai-emotion').textContent = result.emotion;
        document.getElementById('ai-bar-fill').style.width = `${result.score}%`;
        document.getElementById('ai-advice').textContent = result.advice;
      } catch {
        document.getElementById('ai-emotion').textContent = 'エラー';
        document.getElementById('ai-advice').textContent = 'AI分析に失敗しました';
      }
    };

    // ---- メモ ----
    const memoText = document.getElementById('memo-text');
    memoText.value = localStorage.getItem('neko-diary-memo') || '';
    let memoTimer;
    memoText.addEventListener('input', () => {
      clearTimeout(memoTimer);
      document.getElementById('memo-saved').textContent = '保存中...';
      memoTimer = setTimeout(() => {
        localStorage.setItem('neko-diary-memo', memoText.value);
        document.getElementById('memo-saved').textContent = '保存済み';
      }, 800);
    });

    // ---- 明日の予定 ----
    function loadSchedule(dateStr) {
      const tomorrow = new Date(dateStr);
      tomorrow.setDate(tomorrow.getDate() + 1);
      const key = 'neko-schedule-' + formatDate(tomorrow);
      document.getElementById('schedule-text').value = localStorage.getItem(key) || '';
      document.getElementById('schedule-status').textContent = '';
    }

    window.saveSchedule = () => {
      const tomorrow = new Date(selectedDate);
      tomorrow.setDate(tomorrow.getDate() + 1);
      const key = 'neko-schedule-' + formatDate(tomorrow);
      localStorage.setItem(key, document.getElementById('schedule-text').value);
      document.getElementById('schedule-status').textContent = '保存しました';
      setTimeout(() => document.getElementById('schedule-status').textContent = '', 2000);
    };

    // ---- チャット ----
    let chatHistory = [];

    window.sendChat = async () => {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';

      chatHistory.push({ role: 'user', content: text });
      appendMessage('user', text);

      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: chatHistory }),
      });
      const data = await res.json();
      const reply = data.reply || 'エラーが発生しました';
      chatHistory.push({ role: 'assistant', content: reply });
      appendMessage('ai', reply);
    };

    function appendMessage(role, text) {
      const el = document.getElementById('chat-messages');
      const div = document.createElement('div');
      div.className = `chat-msg ${role}`;
      div.textContent = text;
      el.appendChild(div);
      el.scrollTop = el.scrollHeight;
    }

    window.summarizeChat = async () => {
      if (chatHistory.length < 2) return;
      const preview = document.getElementById('summary-preview');
      const actions = document.getElementById('summary-actions');
      preview.style.display = 'block';
      preview.textContent = '要約中...';
      actions.style.display = 'none';

      const res = await fetch('/api/summarize', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: chatHistory }),
      });
      const data = await res.json();
      preview.textContent = data.summary || 'エラーが発生しました';
      actions.style.display = 'flex';
    };

    window.appendSummary = async () => {
      const summary = document.getElementById('summary-preview').textContent;
      const current = document.getElementById('diary-text').value.trim();
      const newText = current ? current + '\n\n' + summary : summary;
      document.getElementById('diary-text').value = newText;

      // Firestoreに保存
      const category = document.getElementById('cat-select').value;
      await setDoc(doc(db, 'entries', selectedDate), {
        date: selectedDate, text: newText, category, updatedAt: new Date().toISOString()
      });
      allEntries[selectedDate] = { date: selectedDate, text: newText, category };
      renderCalendar();
      renderEntryList();
      dismissSummary();
    };

    window.dismissSummary = () => {
      document.getElementById('summary-preview').style.display = 'none';
      document.getElementById('summary-actions').style.display = 'none';
    };

    window.clearChat = () => {
      chatHistory = [];
      const el = document.getElementById('chat-messages');
      el.innerHTML = '<div class="chat-msg ai">こんにちは！今日はどんな一日でしたか？</div>';
      dismissSummary();
    };

    // ---- 初期化 ----
    await loadAllEntries();
    selectDate(selectedDate);
  </script>
</body>
